esphome:
  # Crucial: Use the local path for the header when inside a package
  includes:
    - watch_logic.h
  libraries:
    - deque

esp32:
  board: m5stick-c
  framework:
    type: arduino
  flash_size: 8MB

substitutions:
  devicename: m5stickc-plus2
  upper_devicename: M5StickC PLUS2

output:
  - platform: gpio
    id: hold_pin
    pin: {number: GPIO4, mode: OUTPUT}

display:
  - platform: ili9xxx
    model: st7789v
    id: watch_display
    cs_pin: GPIO5
    dc_pin: GPIO14
    reset_pin: GPIO12
    rotation: 90
    dimensions: {height: 240, width: 135, offset_height: 40, offset_width: 52}
    invert_colors: true
    update_interval: 150ms

i2s_audio:
  - id: bus_internal
    i2s_lrclk_pin: GPIO0
    i2s_bclk_pin: GPIO26

microphone:
  - platform: i2s_audio
    id: stickc_microphone
    i2s_audio_id: bus_internal
    i2s_din_pin: GPIO34
    adc_type: external
    pdm: true
    channel: left

speaker:
  - platform: i2s_audio
    id: media_out
    dac_type: external
    i2s_dout_pin: GPIO25

text_sensor:
  - platform: template
    id: display_text
    internal: true
    update_interval: never

select:
  - platform: template
    name: "Output Mode"
    id: output_mode_select
    options: ["Character Mode", "Word Mode", "Full Mode"]
    initial_option: "Full Mode"
    optimistic: true

sensor:
  - platform: adc
    pin: GPIO38
    attenuation: 12db
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 10s
    filters: [{multiply: 2.0}]

color:
  - {id: my_black, red: 0%, green: 0%, blue: 0%}
  - {id: my_green, red: 0%, green: 100%, blue: 0%}
  - {id: my_blue, red: 0%, green: 0%, blue: 100%}

font:
  - file: "gfonts://LXGW WenKai Mono TC"
    id: font_id
    size: 18